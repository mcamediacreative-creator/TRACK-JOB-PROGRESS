<div id="login-form" class="space-y-4">
    <h3 class="font-bold">Log Masuk Staf</h3>
    <input type="email" id="adminEmail" placeholder="Emel Staf" class="w-full p-2 border rounded">
    <input type="password" id="adminPass" placeholder="Kata Laluan" class="w-full p-2 border rounded">
    <button onclick="login()" class="w-full bg-black text-white p-2 rounded">LOG MASUK</button>
</div>

<div id="staff-controls" class="hidden space-y-4 mt-4 pt-4 border-t">
    <h3 class="font-bold text-green-600">Akses Dibenarkan</h3>
    <input type="text" id="custPhone" placeholder="No. Telefon Pelanggan" class="w-full p-2 border rounded">
    <input type="text" id="jobName" placeholder="Nama Kerja" class="w-full p-2 border rounded">
    <input type="date" id="expDate" class="w-full p-2 border rounded">
    <select id="workProgress" class="w-full p-2 border rounded">
        <option value="In Line">In Line</option>
        <option value="Designing">Designing</option>
        <option value="Printing">Printing</option>
        <option value="Finishing">Finishing</option>
        <option value="Installation">Installation</option>
        <option value="Ready to Pickup">Ready to Pickup</option>
    </select>
    <button onclick="updateJob()" class="w-full bg-red-500 text-white p-3 rounded font-bold">SIMPAN DATA</button>
    <button onclick="logout()" class="w-full text-xs text-gray-500 underline">Log Keluar</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script>
        // MASUKKAN CONFIG FIREBASE ANDA DI SINI
        cconst firebaseConfig = {
          apiKey: "AIzaSyAQy5m_5eCQn933gsbugq8Fg0AiRTu3CKo",
          authDomain: "track-job-progress.firebaseapp.com",
          projectId: "track-job-progress",
          storageBucket: "track-job-progress.firebasestorage.app",
          messagingSenderId: "463137015561",
          appId: "1:463137015561:web:256c816e2485de45a0f5d8",
          measurementId: "G-93S6NJ0V6C"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);

// FUNGSI LOGIN
    async function login() {
        const email = document.getElementById('adminEmail').value;
        const pass = document.getElementById('adminPass').value;
        try {
            await auth.signInWithEmailAndPassword(email, pass);
            alert("Log masuk berjaya!");
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('staff-controls').classList.remove('hidden');
        } catch (error) {
            alert("Ralat: " + error.message);
        }
    }

    // FUNGSI LOGOUT
    function logout() {
        auth.signOut();
        location.reload();
    }

    // FUNGSI UPDATE DATA (Hanya jika logged in)
    async function updateJob() {
        if(!auth.currentUser) return alert("Sila log masuk dahulu!");
        
        const phone = document.getElementById('custPhone').value;
        const job = document.getElementById('jobName').value;
        const date = document.getElementById('expDate').value;
        const status = document.getElementById('workProgress').value;

        await db.collection("jobs").doc(phone).set({
            phone: phone,
            jobName: job,
            expectedDate: date,
            status: status,
            lastUpdate: new Date()
        });
        alert("Kemaskini berjaya!");
    }

    // FUNGSI SEMAK STATUS (Untuk Pelanggan - Tiada login diperlukan)
    async function checkStatus() {
        const phone = document.getElementById('searchPhone').value;
        const resultDiv = document.getElementById('statusResult');
        const doc = await db.collection("jobs").doc(phone).get();
        
        if (doc.exists) {
            const data = doc.data();
            resultDiv.classList.remove('hidden');
            resultDiv.innerHTML = `
                <div class="bg-blue-100 p-4 rounded border-l-4 border-blue-500">
                    <p class="text-sm">Status Kerja:</p>
                    <p class="text-xl font-bold text-blue-800">${data.status}</p>
                    <p class="mt-2 text-xs text-gray-600 italic">Nama Job: ${data.jobName}</p>
                    <p class="text-xs text-gray-600">Jangkaan Siap: ${data.expectedDate}</p>
                </div>`;
        } else {
            alert("Nombor telefon tidak dijumpai dalam sistem.");
        }
    }
</script>
